name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: 下载后端依赖
        run: cd server && go mod tidy

      - name: 运行 go vet
        run: cd server && go vet ./...

      - name: 运行后端测试
        run: cd server && go test -v ./...

  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装前端依赖
        run: npm ci

      - name: 运行前端 lint
        run: npm run lint

      - name: 运行前端测试
        run: npm run test:run

      - name: 运行前端构建
        run: npm run build
