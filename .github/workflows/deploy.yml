# ===============================================
# GitHub Actions 自动部署工作流
# ===============================================
#
# 工作流程：
# 1. 代码推送到 main 分支触发
# 2. 运行 Go 测试和 vet
# 3. 构建 Docker 镜像（跨平台 linux/amd64）
# 4. 推送镜像到 GitHub Container Registry (ghcr.io)
# 5. SSH 到服务器，拉取新镜像并重启容器
#
# 需要配置的 GitHub Environments：
# Secrets:
# - DEPLOY_KEY
# - DB_PASSWORD
# - JWT_SECRET
# - SMTP_PASS
#
# Variables:
# - DEPLOY_HOST, DEPLOY_USER
# - DB_HOST, DB_PORT, DB_USER, DB_NAME
# - EMAIL_DRIVER, EMAIL_FROM_ADDRESS, EMAIL_FROM_NAME
# - SMTP_HOST, SMTP_PORT, SMTP_USER
# - FRONTEND_URL
# - IMAGE_TAG, WEB_CONTAINER_NAME, SERVER_CONTAINER_NAME
# - WEB_PORT, SERVER_PORT, WEB_PUBLIC_URL, API_BASE_URL
# ===============================================

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      ref:
        description: "Git ref to deploy (optional)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: 下载后端依赖
        run: cd server && go mod tidy

      - name: 运行 go vet
        run: cd server && go vet ./...

      - name: 运行后端测试
        run: cd server && go test -v ./...

  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装前端依赖
        run: npm ci

      - name: 运行前端 lint
        run: npm run lint

      - name: 运行前端测试
        run: npm run test:run

      - name: 运行前端构建
        run: npm run build

  build-and-deploy:
    needs:
      - backend-validation
      - frontend-validation
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: 生成小写镜像名
        id: image-names
        run: |
          echo "image_web=${GITHUB_REPOSITORY,,}/web" >> "$GITHUB_OUTPUT"
          echo "image_server=${GITHUB_REPOSITORY,,}/server" >> "$GITHUB_OUTPUT"

      - name: 生成部署配置
        id: deploy-config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "staging" ]; then
            echo "target_env=staging" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ vars.IMAGE_TAG || 'staging-latest' }}" >> "$GITHUB_OUTPUT"
            echo "web_container_name=${{ vars.WEB_CONTAINER_NAME || 'starthere-web-staging' }}" >> "$GITHUB_OUTPUT"
            echo "server_container_name=${{ vars.SERVER_CONTAINER_NAME || 'starthere-server-staging' }}" >> "$GITHUB_OUTPUT"
            echo "web_port=${{ vars.WEB_PORT || '8081' }}" >> "$GITHUB_OUTPUT"
            echo "server_port=${{ vars.SERVER_PORT || '18080' }}" >> "$GITHUB_OUTPUT"
            echo "web_public_url=${{ vars.WEB_PUBLIC_URL || 'https://staging.star-there.com' }}" >> "$GITHUB_OUTPUT"
            echo "api_base_url=${{ vars.API_BASE_URL || 'https://staging.star-there.com/api/v1' }}" >> "$GITHUB_OUTPUT"
          else
            echo "target_env=production" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ vars.IMAGE_TAG || 'latest' }}" >> "$GITHUB_OUTPUT"
            echo "web_container_name=${{ vars.WEB_CONTAINER_NAME || 'starthere-web' }}" >> "$GITHUB_OUTPUT"
            echo "server_container_name=${{ vars.SERVER_CONTAINER_NAME || 'starthere-server' }}" >> "$GITHUB_OUTPUT"
            echo "web_port=${{ vars.WEB_PORT || '80' }}" >> "$GITHUB_OUTPUT"
            echo "server_port=${{ vars.SERVER_PORT || '8080' }}" >> "$GITHUB_OUTPUT"
            echo "web_public_url=${{ vars.WEB_PUBLIC_URL || 'https://star-there.com' }}" >> "$GITHUB_OUTPUT"
            echo "api_base_url=${{ vars.API_BASE_URL || 'https://star-there.com/api/v1' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ steps.deploy-config.outputs.api_base_url }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_web }}:${{ steps.deploy-config.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_web }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_server }}:${{ steps.deploy-config.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_server }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 部署到目标服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 30m
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo; echo "=== Deploying frontend to ${{ steps.deploy-config.outputs.target_env }}..."
            docker pull ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_web }}:${{ steps.deploy-config.outputs.image_tag }}
            docker stop ${{ steps.deploy-config.outputs.web_container_name }} || true
            docker rm ${{ steps.deploy-config.outputs.web_container_name }} || true
            docker run -d \
              --name ${{ steps.deploy-config.outputs.web_container_name }} \
              --restart unless-stopped \
              -p ${{ steps.deploy-config.outputs.web_port }}:80 \
              ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_web }}:${{ steps.deploy-config.outputs.image_tag }}
            echo "Frontend deployed"

            echo; echo "=== Deploying backend to ${{ steps.deploy-config.outputs.target_env }}..."
            docker pull ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_server }}:${{ steps.deploy-config.outputs.image_tag }}

            echo; echo "=== Running database migrations..."
            docker run --rm \
              --name ${{ steps.deploy-config.outputs.server_container_name }}-migrate \
              --entrypoint ./migrate \
              -e DB_HOST=${{ vars.DB_HOST }} \
              -e DB_PORT=${{ vars.DB_PORT }} \
              -e DB_USER=${{ vars.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ vars.DB_NAME }} \
              -e MIGRATIONS_DIR=/root/migrations \
              ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_server }}:${{ steps.deploy-config.outputs.image_tag }} \
              up
            echo "Database migrations completed"

            docker stop ${{ steps.deploy-config.outputs.server_container_name }} || true
            docker rm ${{ steps.deploy-config.outputs.server_container_name }} || true
            docker run -d \
              --name ${{ steps.deploy-config.outputs.server_container_name }} \
              --restart unless-stopped \
              -p ${{ steps.deploy-config.outputs.server_port }}:8080 \
              -e SERVER_PORT=8080 \
              -e GIN_MODE=release \
              -e DB_HOST=${{ vars.DB_HOST }} \
              -e DB_PORT=${{ vars.DB_PORT }} \
              -e DB_USER=${{ vars.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ vars.DB_NAME }} \
              -e DB_AUTO_MIGRATE=false \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_EXPIRY_HOURS=24 \
              -e EMAIL_DRIVER=${{ vars.EMAIL_DRIVER }} \
              -e EMAIL_FROM_ADDRESS=${{ vars.EMAIL_FROM_ADDRESS }} \
              -e EMAIL_FROM_NAME="${{ vars.EMAIL_FROM_NAME }}" \
              -e SMTP_HOST=${{ vars.SMTP_HOST }} \
              -e SMTP_PORT=${{ vars.SMTP_PORT }} \
              -e SMTP_USER=${{ vars.SMTP_USER }} \
              -e SMTP_PASS=${{ secrets.SMTP_PASS }} \
              -e FRONTEND_URL=${{ vars.FRONTEND_URL }} \
              ${{ env.REGISTRY }}/${{ steps.image-names.outputs.image_server }}:${{ steps.deploy-config.outputs.image_tag }}
            echo "Backend deployed"

            echo; echo "=== Smoke checks..."
            sleep 8
            curl -fsS http://127.0.0.1:${{ steps.deploy-config.outputs.server_port }}/health >/dev/null
            curl -fsS http://127.0.0.1:${{ steps.deploy-config.outputs.web_port }}/ >/dev/null
            echo "Smoke checks passed"

            echo; echo "=== Cleanup..."
            docker image prune -f
            docker logout ghcr.io

            echo; echo "Running containers:"
            docker ps | grep starthere

      - name: 部署成功通知
        if: success()
        run: |
          echo "Deployment succeeded"
          echo "Target environment: ${{ steps.deploy-config.outputs.target_env }}"
          echo "Web URL: ${{ steps.deploy-config.outputs.web_public_url }}"
          echo "API base URL: ${{ steps.deploy-config.outputs.api_base_url }}"

      - name: 公网 smoke checks
        if: success()
        env:
          WEB_URL: ${{ steps.deploy-config.outputs.web_public_url }}
          API_BASE_URL: ${{ steps.deploy-config.outputs.api_base_url }}
          SMOKE_TEST_MODE: ${{ steps.deploy-config.outputs.target_env == 'staging' && 'deep' || 'basic' }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: bash ./scripts/smoke_test.sh

# GitHub environments expected:
# - production
# - staging
#
# Each environment should provide these secrets:
# - DEPLOY_KEY
# - DB_PASSWORD
# - JWT_SECRET
# - SMTP_PASS
# - SMOKE_TEST_EMAIL (required for staging deep smoke checks)
# - SMOKE_TEST_PASSWORD (required for staging deep smoke checks)
#
# Each environment should provide these variables:
# - DEPLOY_HOST
# - DEPLOY_USER
# - DB_HOST
# - DB_PORT
# - DB_USER
# - DB_NAME
# - EMAIL_DRIVER
# - EMAIL_FROM_ADDRESS
# - EMAIL_FROM_NAME
# - SMTP_HOST
# - SMTP_PORT
# - SMTP_USER
# - FRONTEND_URL
# - IMAGE_TAG
# - WEB_CONTAINER_NAME
# - SERVER_CONTAINER_NAME
# - WEB_PORT
# - SERVER_PORT
# - WEB_PUBLIC_URL
# - API_BASE_URL
